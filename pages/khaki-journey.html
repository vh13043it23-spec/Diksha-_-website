<!DOCTYPE html>
<html>
<head>
    <title>Journey In Khaki</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- 🎵 Music -->
<audio id="bgmusic" loop>
    <source src="../music/anandha-yaazhai.mp3" type="audio/mpeg">
</audio>

<div class="container">

    <!-- 🌐 Language Switch -->
    <div class="language-switch">
        <button onclick="setEnglish()">English</button>
        <button onclick="setTamil()">தமிழ்</button>
    </div>

    <!-- 🏷️ Title -->
    <h1>
        <span class="en">Journey In Khaki</span>
        <span class="ta" style="display:none;">காக்கி சீருடையின் பயணம்</span>
    </h1>

    <!-- 📸 Image -->
    <img src="../Photos/The Officer/Officer.jpeg"
         alt="Officer"
         class="page-photo">

    <!-- 📝 Content -->
    <p class="subtitle">

        <span class="en">

            From Head Constable to Sub-Inspector.  
            A journey built on discipline, sacrifice and service.

        </span>

        <span class="ta" style="display:none;">

            தலைமை காவலராக இருந்து உதவி ஆய்வாளராக உயர்ந்த பயணம்.  
            ஒழுக்கம், தியாகம் மற்றும் சேவையால் உருவான ஒரு வாழ்க்கைப் பயணம்.

        </span>

    </p>

    <!-- ➡️ Button -->
    <button onclick="location.href='achievements.html'">
        <span class="en">Next →</span>
        <span class="ta" style="display:none;">அடுத்து →</span>
    </button>

</div>

<!-- ⚙️ JS -->
<script src="../js/script.js"></script>

</body>
</html>
